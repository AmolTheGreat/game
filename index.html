<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Survival - Restricted Access</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; display: inline-block; border: 2px solid #333; }
        h1 { color: #ff4757; margin-bottom: 20px; }
        input { 
            padding: 15px; font-size: 1.2rem; border-radius: 10px; border: none; 
            width: 200px; text-align: center; background: #333; color: white;
        }
        button { 
            padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; border: none; 
            background: #ff4757; color: white; cursor: pointer; font-weight: bold; margin-left: 10px;
        }
        button:hover { background: #ff6b81; }
        
        #downloadSection { display: none; margin-top: 30px; padding-top: 30px; border-top: 1px solid #444; }
        
        .download-btn { 
            display: inline-block; background-color: #2ed573; color: white; 
            padding: 20px 40px; font-size: 1.5rem; text-decoration: none; 
            border-radius: 50px; font-weight: bold;
        }
        .download-btn:hover { background-color: #7bed9f; }
        .error { color: #ff4757; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔒 SECURE ACCESS</h1>
        <p>Enter the 6-digit access code to unlock the game download:</p>
        
        <input type="text" id="codeSlot" placeholder="000000" maxlength="6">
        <button onclick="checkCode()">UNLOCK</button>
        <p id="errorMsg" class="error">INVALID ACCESS CODE</p>

        <div id="downloadSection">
            <h2 style="color: #2ed573;">✅ ACCESS GRANTED</h2>
            <p>You may now download <b>Disaster Survival</b></p>
            <a href="game.exe" class="download-btn">📥 DOWNLOAD GAME (.exe)</a>
        </div>
    </div>

    <script>
        function checkCode() {
            const input = document.getElementById('codeSlot').value;
            const section = document.getElementById('downloadSection');
            const error = document.getElementById('errorMsg');

            if (input === "001536") {
                section.style.display = "block";
                error.style.display = "none";
                document.getElementById('codeSlot').disabled = true;
            } else {
                error.style.display = "block";
                section.style.display = "none";
            }
        }
    </script>

</body>
</html>
